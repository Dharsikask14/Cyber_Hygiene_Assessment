<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Results — Hackers InfoTech</title>
  
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css" />
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="../js/shared.js" defer></script>
</head>
<body>
  <nav>
    <div class="nav-content">
      <a href="../index.html" class="nav-brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z" fill="#38BDF8" opacity=".15"/>
          <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z" stroke="#38BDF8" strokeWidth="1.5"/>
          <path d="M9 12l2 2 4-4" stroke="#38BDF8" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
        <span>Hackers InfoTech</span>
      </a>
      <div class="nav-right">
        <button id="themeToggle" class="theme-toggle-btn">🌙 Dark Mode</button>
        <span class="nav-city">Coimbatore, India</span>
      </div>
    </div>
  </nav>

  <div class="container fade-in" style="padding-top: 36px;" id="resultsContainer">
    <!-- Rendered by JS -->
  </div>

  <!-- Hidden PDF Targets -->
  <div id="pdf-cert" style="display:none; position:fixed; top:0; left:0; width:794px; z-index:-999; background:#0C1B2E; padding:60px 40px; box-sizing:border-box;"></div>
  <div id="pdf-report" style="display:none; position:fixed; top:0; left:0; width:794px; z-index:-999; background:#fff; padding:40px 30px; box-sizing:border-box; color:#000;"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      emailjs.init(BRAND.emailjs.publicKey);

      const type = localStorage.getItem('assessmentType');
      const ans = JSON.parse(localStorage.getItem('answers') || '{}');
      const lead = JSON.parse(localStorage.getItem('lead') || '{}');

      if(!type || !lead.email) {
        window.location.href = '../index.html';
        return;
      }

      const sections = ALL[type];
      const mx = maxScore(type);
      const allQ = sections.flatMap(s => s.questions);
      const score = allQ.reduce((s, q) => s + (ans[q.id] === 'yes' ? q.w : 0), 0);
      const pct = mx > 0 ? Math.round((score / mx) * 100) : 0;
      const G = getGrade(pct);
      const failed = allQ.filter(q => ans[q.id] === 'no');
      const date = new Date().toLocaleDateString("en-IN", {day:"2-digit", month:"long", year:"numeric"});

      // Prepare UI
      let html = `
        <div class="card" style="background:${G.bg}; border-color:${G.color}33; text-align:center; margin-bottom:20px;">
          <div style="font-size:11px; font-weight:600; color:${G.color}; letter-spacing:.1em; text-transform:uppercase; margin-bottom:10px;">Cyber Safety Grade · ${date}</div>
          <div style="font-size:88px; font-weight:700; color:${G.color}; line-height:1; font-family:'DM Mono', monospace;">${G.grade}</div>
          <div style="font-size:20px; font-weight:600; margin-top:6px;">${G.label}</div>
          <div style="font-size:28px; font-weight:700; color:${G.color}; margin-top:4px;">${pct}%</div>
          <div style="font-size:14px; color:var(--text-secondary); margin-bottom:10px;">${score} / ${mx} points</div>
          <div style="font-size:14px; line-height:1.7; max-width:420px; margin:0 auto;">${G.desc}</div>
        </div>

        <div class="card" style="margin-bottom:20px;">
          <h3 style="font-size:15px; font-weight:600; margin:0 0 16px;">📄 Your Certificate & Report</h3>
          <div style="background:var(--bg-color); border:1px dashed var(--border-color); border-radius:12px; padding:16px; margin-bottom:14px; display:flex; gap:16px; align-items:center; flex-wrap:wrap;">
            <div id="cert-qr-code" style="background:#fff; padding:10px; border-radius:10px; flex-shrink:0;"></div>
            <div style="flex:1; min-width:180px;">
              <div style="font-size:11px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px;">Certificate ID</div>
              <div id="cert-id-display" style="font-family:monospace; font-size:13px; font-weight:700; color:var(--primary-color); word-break:break-all; margin-bottom:8px;">—</div>
              <div style="font-size:12px; color:var(--text-secondary); line-height:1.6;">Scan the QR code to verify this certificate's authenticity instantly.</div>
              <button onclick="copyCertLink()" id="copy-cert-btn" style="margin-top:8px; background:var(--card-bg); border:1px solid var(--border-color); border-radius:8px; padding:6px 14px; font-size:12px; font-weight:600; cursor:pointer; color:var(--text-primary);">🔗 Copy Verify Link</button>
            </div>
          </div>
          <div class="grid-2" style="margin-bottom:14px;">
            <button onclick="dlPDF('cert')" id="btnCert" style="background:#F5F3FF; border:1px solid #DDD6FE; border-radius:10px; padding:12px; font-size:13px; font-weight:600; color:#7C3AED; cursor:pointer;">🏅 Download Certificate</button>
            <button onclick="dlPDF('report')" id="btnReport" style="background:#EFF6FF; border:1px solid #BFDBFE; border-radius:10px; padding:12px; font-size:13px; font-weight:600; color:#1D4ED8; cursor:pointer;">📋 Download Full Report</button>
          </div>
          <button onclick="sendEmail()" id="btnEmail" style="width:100%; background:var(--primary-color); border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:600; color:#fff; cursor:pointer;">📧 Email Report to ${lead.email}</button>
        </div>

        <div class="card" style="margin-bottom:20px;">
          <h3 style="font-size:15px; font-weight:600; margin:0 0 16px;">Category Breakdown</h3>
          ${sections.map(s => {
            const sm = s.questions.reduce((a, q) => a + q.w, 0);
            const ss = s.questions.reduce((a, q) => a + (ans[q.id] === 'yes' ? q.w : 0), 0);
            const sp = Math.round((ss / sm) * 100);
            const col = sp >= 80 ? '#059669' : sp >= 60 ? '#D97706' : '#DC2626';
            const bgcol = sp >= 80 ? '#059669' : sp >= 60 ? '#F59E0B' : '#EF4444';
            return `
              <div style="margin-bottom:14px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                  <span style="font-size:13px; font-weight:500;">${s.icon} ${s.title}</span>
                  <span style="font-size:13px; font-weight:600; color:${col};">${sp}%</span>
                </div>
                <div style="background:var(--border-color); border-radius:99px; height:7px;">
                  <div style="background:${bgcol}; height:7px; border-radius:99px; width:${sp}%; transition:width .6s;"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>

        ${failed.length > 0 ? `
        <div class="card" style="margin-bottom:20px;">
          <h3 style="font-size:15px; font-weight:600; margin:0 0 4px;">Your Action Plan</h3>
          <p style="font-size:13px; color:var(--text-secondary); margin:0 0 18px;">Fix these ${failed.length} items to improve your score</p>
          ${failed.map((q, i) => `
            <div style="border-left:3px solid #EF4444; padding-left:14px; margin-bottom:16px;">
              <div style="font-size:13px; font-weight:600; margin-bottom:4px; line-height:1.5;">${q.text}</div>
              <div style="font-size:12px; color:var(--text-secondary); line-height:1.7;"><span style="font-weight:600; color:var(--primary-color);">Fix: </span>${q.tip}</div>
            </div>
          `).join('')}
        </div>
        ` : ''}

        <div style="background:#0C1B2E; border-radius:16px; padding:28px 24px; text-align:center;">
          <div style="font-size:15px; font-weight:600; color:#F0F9FF; margin-bottom:8px;">Want Hackers InfoTech to fix this for you?</div>
          <div style="font-size:13px; color:#94A3B8; margin-bottom:22px; line-height:1.7;">Book a free 30-minute consultation. We will walk through your results and create a personalised cyber security plan.</div>
          <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
            <a href="${BRAND.bookingUrl}" target="_blank" rel="noopener noreferrer" class="btn-primary" style="font-size:14px; padding:12px 24px;">📅 Book Free 30-Min Call</a>
            <button onclick="window.location.href='../index.html'" style="background:transparent; border:1px solid #1E3050; color:#94A3B8; border-radius:9px; padding:12px 24px; font-size:14px; cursor:pointer;">Retake Assessment</button>
          </div>
          <div style="margin-top:20px; padding-top:20px; border-top:1px solid #1E3050; display:flex; justify-content:center; gap:24px; flex-wrap:wrap;">
            <span style="font-size:12px; color:#64748B;">🌐 ${BRAND.url}</span>
            <span style="font-size:12px; color:#64748B;">📞 ${BRAND.phone}</span>
            <span style="font-size:12px; color:#64748B;">✉️ ${BRAND.email}</span>
          </div>
        </div>
      `;

      document.getElementById('resultsContainer').innerHTML = html;

      // ── Correct base URL regardless of subdirectory depth (GitHub Pages safe) ─
      const pageBase = location.href.replace(/\/html\/results\.html.*$/, '');
      const certId    = lead.certId || '';
      const verifyUrl = certId
        ? `${pageBase}/html/cert_verify.html?id=${encodeURIComponent(certId)}&name=${encodeURIComponent(lead.name)}`
        : '';

      document.getElementById('cert-id-display').textContent = certId || 'Not available';

      // Helper: render QR into a temp container and return the image data-URL
      function makeQRDataUrl(text, size) {
        return new Promise(resolve => {
          const tmp = document.createElement('div');
          tmp.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
          document.body.appendChild(tmp);
          new QRCode(tmp, {
            text, width: size, height: size,
            colorDark: '#0F172A', colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
          });
          // Wait for QRCode library to render (canvas or img)
          setTimeout(() => {
            const el  = tmp.querySelector('canvas') || tmp.querySelector('img');
            const src = el
              ? (el.tagName === 'CANVAS' ? el.toDataURL('image/png') : el.src)
              : '';
            document.body.removeChild(tmp);
            resolve(src);
          }, 500);
        });
      }

      if (certId) {
        // Small QR for the results card
        new QRCode(document.getElementById('cert-qr-code'), {
          text: verifyUrl, width: 100, height: 100,
          colorDark: '#0F172A', colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H
        });
      }

      window.copyCertLink = () => {
        if (!verifyUrl) return;
        navigator.clipboard.writeText(verifyUrl);
        const btn = document.getElementById('copy-cert-btn');
        btn.innerHTML = '✅ Copied!';
        setTimeout(() => { btn.innerHTML = '🔗 Copy Verify Link'; }, 2000);
      };

      // ── Build PDF cert: pre-generate QR as data-URL so html2canvas can embed it
      // Store the promise so dlPDF can await it before capturing the PDF element
      const pdfCertReady = (async () => {
        const qrDataUrl = certId ? await makeQRDataUrl(verifyUrl, 200) : '';
        document.getElementById('pdf-cert').innerHTML = `
          <div style="border:2px solid #0EA5E9; border-radius:20px; padding:50px 40px; text-align:center; color:#fff; max-width:700px; margin:0 auto; font-family:'DM Sans', sans-serif;">
            <div style="font-size:12px; letter-spacing:.12em; color:#38BDF8; text-transform:uppercase; margin-bottom:12px;">Hackers InfoTech — Official Certificate</div>
            <div style="font-size:30px; font-weight:700; color:#F0F9FF; margin-bottom:4px;">Cyber Hygiene Assessment</div>
            <div style="color:#64748B; margin-bottom:32px; font-size:13px;">Certificate of Completion</div>
            <div style="font-size:14px; color:#94A3B8; margin-bottom:6px;">This certifies that</div>
            <div style="font-size:28px; font-weight:700; color:#38BDF8; margin-bottom:4px;">${lead.name}</div>
            ${lead.company ? `<div style="font-size:13px; color:#64748B; margin-bottom:24px;">${lead.company}</div>` : ''}
            <div style="font-size:13px; color:#94A3B8; margin-bottom:16px;">has completed the Cyber Hygiene Assessment and achieved the grade</div>
            <div style="font-size:96px; font-weight:700; color:${G.color}; line-height:1; font-family:'DM Mono', monospace;">${G.grade}</div>
            <div style="font-size:20px; font-weight:600; color:#F0F9FF; margin:8px 0 4px;">${G.label}</div>
            <div style="font-size:22px; color:${G.color}; font-weight:700; margin-bottom:4px;">${pct}% (${score}/${mx} pts)</div>
            <div style="color:#475569; font-size:12px; margin-bottom:28px;">Assessed on ${date}</div>
            ${qrDataUrl ? `
            <div style="background:#0A1628; border:1px solid #1E3050; border-radius:14px; padding:20px; margin-bottom:28px; display:inline-flex; flex-direction:column; align-items:center; gap:10px;">
              <img src="${qrDataUrl}" width="130" height="130" style="border-radius:8px; display:block;" />
              <div style="color:#94A3B8; font-size:10px; letter-spacing:.06em; text-transform:uppercase;">Scan to verify</div>
              <div style="color:#38BDF8; font-family:monospace; font-size:11px; font-weight:700;">${certId}</div>
            </div>` : ''}
            <div style="border-top:1px solid #1E3050; padding-top:18px; display:flex; justify-content:space-between; font-size:11px; color:#475569;">
              <span>${BRAND.url}</span><span>${BRAND.email}</span><span>${BRAND.city}</span>
            </div>
          </div>
        `;
      })();

      // Prepare hidden report
      document.getElementById('pdf-report').innerHTML = `
        <div style="font-family:'DM Sans', sans-serif; color:#0F172A;">
          <div style="background:#0C1B2E; color:#fff; padding:24px; border-radius:12px; margin-bottom:20px;">
            <div style="font-size:10px; letter-spacing:.1em; color:#38BDF8; text-transform:uppercase; margin-bottom:6px;">Hackers InfoTech — Confidential Report</div>
            <div style="font-size:22px; font-weight:700; margin-bottom:4px;">Cyber Hygiene Assessment Report</div>
            <div style="font-size:13px; color:#94A3B8;">Prepared for: <b style="color:#fff">${lead.name}</b>${lead.company ? ` · ${lead.company}` : ''} · ${date}</div>
            <div style="font-size:12px; color:#64748B; margin-top:4px;">📧 ${lead.email} · 📞 ${lead.phone}</div>
          </div>
          <div style="background:#F8FAFC; border:2px solid ${G.color}44; border-radius:12px; padding:20px; text-align:center; margin-bottom:18px;">
            <div style="font-size:60px; font-weight:700; color:${G.color}; line-height:1; font-family:'DM Mono', monospace;">${G.grade}</div>
            <div style="font-size:16px; font-weight:600;">${G.label}</div>
            <div style="font-size:18px; font-weight:700; color:${G.color};">${pct}% · ${score}/${mx} pts</div>
            <div style="font-size:12px; color:#64748B; margin-top:6px;">${G.desc}</div>
          </div>
          <h3 style="font-size:14px; margin-bottom:10px;">Category Breakdown</h3>
          <table style="width:100%; border-collapse:collapse; font-size:12px; margin-bottom:20px; border:1px solid #E2E8F0;">
            <thead><tr style="background:#F1F5F9;">
              <th style="padding:8px 10px; text-align:left;">Category</th>
              <th style="padding:8px 10px; text-align:center;">Score %</th>
              <th style="padding:8px 10px; text-align:center;">Points</th>
            </tr></thead>
            <tbody>${sections.map(s=>{
              const sm=s.questions.reduce((a,q)=>a+q.w,0);
              const ss=s.questions.reduce((a,q)=>a+(ans[q.id]==='yes'?q.w:0),0);
              const sp=Math.round((ss/sm)*100);
              return `<tr><td style="padding:7px 10px; border-bottom:1px solid #E2E8F0;">${s.icon} ${s.title}</td>
                <td style="padding:7px 10px; border-bottom:1px solid #E2E8F0; text-align:center; font-weight:600; color:${sp>=80?'#059669':sp>=60?'#D97706':'#DC2626'};">${sp}%</td>
                <td style="padding:7px 10px; border-bottom:1px solid #E2E8F0; text-align:center;">${ss}/${sm}</td></tr>`;
            }).join('')}</tbody>
          </table>
          ${failed.length>0 ? `<h3 style="font-size:14px; margin-bottom:10px;">Action Plan (${failed.length} items)</h3>
          ${failed.map((q,i)=>`
            <div style="margin-bottom:12px; padding-left:10px; border-left:3px solid #EF4444;">
              <div style="font-weight:600; font-size:12px; margin-bottom:2px;">${i+1}. ${q.text}</div>
              <div style="font-size:11px; color:#64748B;"><b style="color:#0EA5E9;">Fix: </b>${q.tip}</div>
            </div>
          `).join('')}` : ''}
          <div style="background:#0C1B2E; color:#fff; border-radius:10px; padding:14px; margin-top:20px; font-size:11px; text-align:center;">
            <b>${BRAND.name}</b> · ${BRAND.url} · ${BRAND.email} · ${BRAND.phone} · ${BRAND.city}
          </div>
        </div>
      `;

      // Window functions
      window.dlPDF = async (which) => {
        const btnId = which === 'cert' ? 'btnCert' : 'btnReport';
        const elId  = which === 'cert' ? 'pdf-cert'  : 'pdf-report';
        const filename = which === 'cert' ? `${lead.name}_Certificate.pdf` : `${lead.name}_CyberReport.pdf`;
        const btn = document.getElementById(btnId);
        const originalText = btn.innerHTML;

        btn.innerHTML = '⏳ Generating...';
        btn.disabled  = true;

        // If downloading the certificate, ensure QR is fully rendered first
        if (which === 'cert') await pdfCertReady;

        const el = document.getElementById(elId);
        el.style.display = 'block';
        await new Promise(r => setTimeout(r, 300)); // allow browser to paint

        try {
          const canvas = await html2canvas(el, { scale: 2, useCORS: true, allowTaint: true, backgroundColor: which === 'cert' ? '#0C1B2E' : '#ffffff' });
          el.style.display = 'none';

          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
          const w = pdf.internal.pageSize.getWidth();
          const h = (canvas.height * w) / canvas.width;
          pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, w, h);
          pdf.save(filename);
        } catch(e) {
          console.error(e);
          alert('Error generating PDF.');
          el.style.display = 'none';
        } finally {
          btn.innerHTML = originalText;
          btn.disabled  = false;
        }
      };

      window.sendEmail = async () => {
        const btn = document.getElementById('btnEmail');
        btn.innerHTML = '⏳ Sending...';
        btn.disabled = true;

        try {
          await emailjs.send(
            BRAND.emailjs.serviceId,
            BRAND.emailjs.templateId,
            {
              to_email: lead.email,
              to_name: lead.name,
              subject: `Your Cyber Hygiene Report — Grade ${G.grade} (${pct}%) | Hackers InfoTech`,
              html_body: `<div style="font-family:Arial,sans-serif;max-width:700px;margin:0 auto;padding:30px;">
                <div style="background:#0C1B2E;color:#fff;padding:24px;border-radius:12px;margin-bottom:20px;">
                  <h2 style="margin:0 0 6px;color:#38BDF8;">Hackers InfoTech</h2>
                  <p style="margin:0;color:#94A3B8;font-size:13px;">Cyber Hygiene Assessment Report · ${date}</p>
                </div>
                <p>Dear <b>${lead.name}</b>,</p>
                <p>Thank you for completing the <b>Hackers InfoTech Cyber Hygiene Assessment</b>.</p>
                <div style="background:#F8FAFC;border:2px solid ${G.color}44;border-radius:12px;padding:20px;text-align:center;margin:20px 0;">
                  <div style="font-size:60px;font-weight:700;color:${G.color};line-height:1;">${G.grade}</div>
                  <div style="font-size:18px;font-weight:600;">${G.label}</div>
                  <div style="font-size:20px;font-weight:700;color:${G.color};">${pct}% · ${score}/${mx} points</div>
                  <p style="color:#64748B;font-size:13px;margin-top:8px;">${G.desc}</p>
                </div>
                ${failed.length>0 ? `<h3>Your Action Plan (${failed.length} items to fix)</h3>
                ${failed.map((q,i)=>`<div style="margin-bottom:14px;padding-left:12px;border-left:3px solid #EF4444;">
                  <b style="font-size:13px;">${i+1}. ${q.text}</b><br/>
                  <span style="font-size:12px;color:#64748B;"><span style="color:#0EA5E9;font-weight:600;">Fix:</span> ${q.tip}</span>
                </div>`).join("")}` : `<p style="color:#059669;font-weight:600;">✅ Excellent! No action items needed.</p>`}
                <div style="background:#0C1B2E;color:#fff;border-radius:10px;padding:18px;margin-top:24px;text-align:center;">
                  <p style="margin:0 0 8px;font-weight:600;">Book a Free 30-Min Consultation</p>
                  <a href="${BRAND.bookingUrl}" style="color:#38BDF8;">${BRAND.bookingUrl}</a><br/>
                  <p style="margin:10px 0 0;font-size:12px;color:#64748B;">${BRAND.name} · ${BRAND.email} · ${BRAND.phone} · ${BRAND.city}</p>
                </div>
              </div>`,
            }
          );
          btn.innerHTML = `✅ Report sent to ${lead.email}`;
          btn.style.background = '#ECFDF5';
          btn.style.color = '#059669';
          btn.style.border = '1px solid #A7F3D0';
        } catch(e) {
          console.error(e);
          btn.innerHTML = '❌ Send failed. Check config.';
          btn.style.background = '#FEF2F2';
          btn.style.color = '#DC2626';
          btn.style.border = '1px solid #FCA5A5';
          btn.disabled = false;
        }
      };

    });
  </script>
</body>
</html>
