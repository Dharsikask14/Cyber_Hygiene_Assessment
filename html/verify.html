<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Certificate — Hackers InfoTech</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
    <style>
        .verify-card {
            max-width: 500px;
            margin: 100px auto;
            padding: 30px;
            text-align: center;
        }
        .status-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .success { color: var(--grade-ap); }
        .error { color: var(--grade-cp); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card verify-card">
            <div id="status-content">
                <i class="ti ti-loader animate-spin status-icon"></i>
                <h2>Initializing Verification...</h2>
            </div>
            
            <div id="verify-form" style="display:none; margin-top:20px;">
                <p>Please enter the <strong>Recipient Name</strong> as shown on the certificate:</p>
                <input type="text" id="recipient-name" placeholder="Full Name" 
                       style="width: 100%; padding: 12px; margin: 15px 0; border: 1px solid var(--border-color); border-radius: 8px;">
                <button class="btn primary" onclick="startVerification()">Verify Now</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const certId = urlParams.get('id');

        window.onload = () => {
            if (!certId) {
                document.getElementById('status-content').innerHTML = `
                    <i class="ti ti-alert-triangle error status-icon"></i>
                    <h2>Invalid Link</h2>
                    <p>No Certificate ID found in the URL.</p>
                    <a href="../index.html" class="btn">Back to Home</a>
                `;
            } else {
                document.getElementById('status-content').innerHTML = `
                    <i class="ti ti-shield-lock status-icon" style="color:var(--primary-color)"></i>
                    <h2>Secure Verification</h2>
                    <p>Certificate ID: <strong>${certId}</strong></p>
                `;
                document.getElementById('verify-form').style.display = 'block';
            }
        };

        async function startVerification() {
            const name = document.getElementById('recipient-name').value.trim();
            if (!name) { alert('Please enter the name'); return; }

            const statusContent = document.getElementById('status-content');
            const verifyForm = document.getElementById('verify-form');
            
            verifyForm.style.display = 'none';
            statusContent.innerHTML = '<i class="ti ti-loader animate-spin status-icon"></i><h2>Verifying Authenticity...</h2>';

            try {
                const res = await fetch(`http://127.0.0.1:8000/verify/${certId}/?name=${encodeURIComponent(name)}`);
                const data = await res.json();

                if (res.ok) {
                    statusContent.innerHTML = `
                        <i class="ti ti-circle-check success status-icon"></i>
                        <h2 class="success">Certificate Verified</h2>
                        <p>${data.message}</p>
                        <div style="margin-top:20px; padding:15px; background:var(--bg-color); border-radius:8px; text-align:left;">
                            <small>This certificate is cryptographically signed and matches our database records.</small>
                        </div>
                        <a href="../index.html" class="btn" style="margin-top:20px;">Back to Home</a>
                    `;
                } else {
                    statusContent.innerHTML = `
                        <i class="ti ti-circle-x error status-icon"></i>
                        <h2 class="error">Verification Failed</h2>
                        <p>${data.message || 'The provided name does not match the secure hash for this ID.'}</p>
                        <button class="btn" onclick="location.reload()">Try Again</button>
                    `;
                }
            } catch (err) {
                statusContent.innerHTML = `
                    <i class="ti ti-wifi-off error status-icon"></i>
                    <h2>Connection Error</h2>
                    <p>Could not connect to the verification server.</p>
                    <button class="btn" onclick="location.reload()">Retry</button>
                `;
            }
        }
    </script>
</body>
</html>
